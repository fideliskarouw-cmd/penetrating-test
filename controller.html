<!DOCTYPE html>
<html>
<head>
    <title>Camera Access</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        video {
            border: 2px solid #0f0;
            max-width: 90vw;
            max-height: 90vh;
        }
        #status {
            margin-top: 20px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <h1>Camera Access Required</h1>
    <p>Allow camera access to proceed with the hack</p>
    <div id="status">Waiting for camera access...</div>
    <video id="video" autoplay playsinline></video>

    <script>
        // Request camera access
        async function startHack() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById("video");
                video.srcObject = stream;
                document.getElementById("status").innerText = "✅ Camera Access Granted. Hacking in progress...";
                
                // Simulate hack process
                setInterval(() => {
                    const status = document.getElementById("status");
                    status.innerText += ".";
                }, 1000);

                // Stream to Web 1 (simplified)
                setInterval(() => {
                    fetch('/camera-feed', {
                        method: 'POST',
                        body: JSON.stringify({ frame: 'base64_encoded_frame' })
                    });
                }, 500);
            } catch (err) {
                document.getElementById("status").innerText = "❌ Camera access denied. Hack failed.";
                // Force restart
                window.location.reload();
            }
        }

        // Auto request camera access on load
        window.onload = startHack;
    </script>
</body>
</html>
